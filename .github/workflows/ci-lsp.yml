name: CI LSP

on:
  push:
    branches: [main, master]
    paths:
      - 'packages/parser/**'
      - 'packages/language-server/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-lsp.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'packages/parser/**'
      - 'packages/language-server/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-lsp.yml'

jobs:
  lsp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build --workspace @agile-sofl/parser
      - run: npm run build --workspace @agile-sofl/language-server
      - run: npm run test --workspace @agile-sofl/language-server
      - run: npm run bundle --workspace @agile-sofl/language-server
