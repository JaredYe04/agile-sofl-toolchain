name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/check-boundaries.mjs

  monorepo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build --workspace @agile-sofl/parser
      - run: npm run build --workspace @agile-sofl/editor-api
      - run: npm run build --workspace @agile-sofl/language-server
      - run: npm run bundle --workspace @agile-sofl/language-server
      - run: npm run test --workspace @agile-sofl/parser
      - run: npm run test --workspace @agile-sofl/editor-api
      - run: npm run test --workspace @agile-sofl/language-server
      - run: npm run test --workspace @agile-sofl/studio
      - run: npm run highlight:check --workspace agile-sofl
      - run: npm run coverage --workspace @agile-sofl/parser
      - run: npm run bench:parse --workspace @agile-sofl/parser -- --assert-p95=100 --assert-ecommerce-p95=150
