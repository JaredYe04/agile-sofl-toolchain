name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Language server tests
        run: npm test --prefix packages/language-server
      - name: Editor API contract tests
        run: npm test --prefix packages/editor-api
      - name: Highlight tests
        run: npm run highlight:check
      - name: Coverage
        run: npm run coverage
      - name: Parse benchmark (banking + ecommerce P95)
        run: node scripts/bench-parse.mjs --assert-p95=100 --assert-ecommerce-p95=150
