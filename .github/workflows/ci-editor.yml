name: CI Editor

on:
  push:
    branches: [main, master]
    paths:
      - 'packages/**'
      - 'examples/**'
      - '.github/workflows/ci-editor.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'packages/**'
      - 'examples/**'
      - '.github/workflows/ci-editor.yml'

jobs:
  editor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build --workspace @agile-sofl/parser
      - run: npm run highlight:check --workspace agile-sofl
      - run: npm run build --workspace @agile-sofl/language-server
      - run: npm run test --workspace @agile-sofl/language-server
      - run: npm run bundle-server --workspace agile-sofl
      - run: npm run build --workspace agile-sofl
      - run: npm run package --workspace agile-sofl
